name: CI

# Mirrors the Vercel build gate (tsc --noEmit && vite build) so type/JSX
# errors are caught here in ~30s on every push — before a red production deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build (vite)
        run: npm run build
